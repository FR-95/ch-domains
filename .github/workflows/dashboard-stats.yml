name: Dashboard Stats Build

on:
  workflow_dispatch:
  schedule:
    - cron: '15 0 * * *' # run after the zone snapshot workflow
  push:
    branches:
      - main
    paths:
      - ch/**
      - ch-summary.txt
      - scripts/build-stats.mjs

jobs:
  build-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Build dashboard stats
        run: |
          node scripts/build-stats.mjs

      - name: Validate generated JSON
        run: |
          node -e "JSON.parse(require('node:fs').readFileSync('site/data/summary.json','utf8')); JSON.parse(require('node:fs').readFileSync('site/data/composition.json','utf8'));"

      - name: Commit and push dashboard data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ./site/data
          git commit -m 'Update dashboard stats' || echo "No stats changes to commit"
          git push origin HEAD:main
